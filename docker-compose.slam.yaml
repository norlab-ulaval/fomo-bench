services:
    run_slam:
        extends:
            file: docker-compose.common.yaml
            service: slam-base
        image: ${SLAM_IMAGE}
        container_name: run_slam_${SLAM_LABEL}
        hostname: run_slam_${SLAM_LABEL}
        environment:
            IS_MAPPING: ${IS_MAPPING:-0}
            STORAGE_PATH: /data
            NAMESPACE: ${SLAM_LABEL}
            IMU_TYPE: ${IMU_TYPE}
        volumes:
            - ${PROCESSING_PATH_HOST:-/tmp}:/data
            - /home/mbo/legs_ws/fomo-bench/ros_launchers:/ros2_ws/src/ros_launchers
            - /home/mbo/legs_ws/src/droid_slam_ros/ros_node.py:/ros2_ws/src/legs_ros_ws/droid_slam_ros/ros_node.py

    run_slam_gpu:
        extends:
            service: run_slam
        deploy:
            resources:
                reservations:
                    devices:
                        - driver: nvidia
                          count: all
                          capabilities: [gpu]
    record_odometry:
        extends:
            file: docker-compose.common.yaml
            service: record-odometry-base
        container_name: record_odometry_${SLAM_LABEL}
        hostname: record_odometry_${SLAM_LABEL}
        environment:
            OUTPUT_FILE_NAME: ${OUTPUT_FILE_NAME}
            OUTPUT_PATH_HOST: ${OUTPUT_PATH_HOST}
            NAMESPACE: ${SLAM_LABEL}
        volumes:
            - ${OUTPUT_PATH_HOST:-/tmp}:/trajectory_files

networks:
    ros-net:
        name: fomo-bench_ros-net
        external: true
